    Recibe noticias sobre la fecha de lanzamiento, eventos de
    presentación y artículos exclusivos sobre economía dominicana.
  placeholder: "tu@correo.com"
  button: "Suscribirme"
  button_loading: "Suscribiendo..."
  success: "Te has suscrito correctamente. Pronto recibirás noticias."
  disclaimer: "Sin spam. Solo contenido relevante sobre economía dominicana."

