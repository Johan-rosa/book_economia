# ------ Hero Section ------
hero:
  badge: "Nueva publicación"
  title: "Introducción a la Economía"
  subtitle: "Una visión desde la República Dominicana"
  description: >
    El primer libro de economía con ejemplos apegados al contexto y la
    historia económica de la República Dominicana. Desde las reformas
    monetarias hasta las zonas francas, cada concepto cobra vida con
    datos reales.
  cta_primary:
    label: "Recibir actualizaciones"
    href: "#suscribete"
  cta_secondary:
    label: "Explorar contenido"
    href: "#contenido"
  byline: "Una publicación de Fundación Empírica"

# ------ Newsletter ------
newsletter:
